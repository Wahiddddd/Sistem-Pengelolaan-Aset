# 1. Koneksi Database
spring.datasource.url=jdbc:mysql://localhost:3306/db_asset_management?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=W@hid123.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Konfigurasi JPA / Hibernate
# 'update' akan membuat tabel otomatis jika belum ada di database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Opsional: Menonaktifkan Open In View warning
spring.jpa.open-in-view=false